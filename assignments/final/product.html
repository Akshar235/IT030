<script>
  window.dataLayer = window.dataLayer || [];

  gtag('js', new Date());

  gtag('config', 'G-6BNZWYW9E5');

<meta charset="UTF-8">
<title>Product</title>
<link rel="stylesheet" href="style.css">
  <style>
    /* ============================================================
      These styles are provided for you.
      You do not need to change them — but you can if you want.
      ============================================================ */

    #filter-area {
      margin: 24px 0 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #filter-area label {
      font-weight: bold;
      font-size: 1rem;
    }

    #category-select {
      padding: 8px 12px;
      font-size: 1rem;
      border: 2px solid #0f3460;
      border-radius: 4px;
      background: white;
      cursor: pointer;
    }

    #results-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 8px;
    }

    .item-card {
      background: white;
      border: 1px solid #ddd;
      border-left: 4px solid #0f3460;
      border-radius: 6px;
      padding: 18px 20px;
      width: calc(50% - 10px);
      box-sizing: border-box;
    }

    .item-card h3 {
      margin: 0 0 6px;
      font-size: 1rem;
      color: #0f3460;
    }

    .item-card p {
      margin: 0 0 10px;
      font-size: 0.9rem;
      color: #555;
    }

    .item-tag {
      display: inline-block;
      padding: 3px 10px;
      background: #e8eaf6;
      color: #0f3460;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: bold;
    }

    #result-count {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 4px;
    }
  </style>
</head>

<body>

<header class="header">
    <h1>Akshar Gopa</h1>
    <nav class="nav">
        <a href="index.html" onclick="gtag('event','nav_click',{link_name:'home'})">Home</a>
        <a href="about.html" onclick="gtag('event','nav_click',{link_name:'about'})">About</a>
        <a href="work.html" onclick="gtag('event','nav_click',{link_name:'work'})">Work</a>
        <a href="contact.html" onclick="gtag('event','nav_click',{link_name:'contact'})">Contact</a>
        <a href="product.html" class="active" onclick="gtag('event','nav_click',{link_name:'product'})">Product</a>
    </nav>
</header>

<main>
  <section class="section-box">
    <h2>Product Interests</h2>
    <p>Use the dropdown to filter by category.</p>
  </section>

  <!--
        The dropdown menu. When the user picks a category,
        onchange calls the filterItems() function and passes
        the selected value to it.

        The value="" on the first option means "show everything."
        The other values must exactly match the categories
        in your data array below.

        TODO A: Replace the placeholder <option> values and text
        with your real category names.
        Add or remove <option> lines to match your data.
      -->

    <div id="filter-area">
    <label for="category-select"><strong>Filter by category:</strong></label>
    <select id="category-select" onchange="filterItems(this.value); if (typeof gtag === 'function') { gtag('event', 'product_filter_change', { selected_category: this.value || 'All' }); }">
      <option value="">All</option>
      <option value="Language">Language</option>
      <option value="Project">Project</option>
      <option value="Goal">Goal</option>
    </select>
    </div>

  <p id="result-count"></p>
      <!--
        This is where your item cards will appear.
        The renderItems() function will fill it in.
        Do not put anything inside these tags.
      -->
      <div id="results-container"></div>
</main>

<footer>
    <p>© 2026 Akshar Gopa</p>
</footer>

  <!--
    Link to your external JavaScript file.
    This must be at the BOTTOM of the body — after all the HTML above.
    If you put it in the <head>, the script runs before the page
    elements exist and getElementById will return null.
  -->

<script src="script.js"></script>
</body>
</html>
